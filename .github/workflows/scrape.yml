name: Scrape Tennis Court Reservations

on:
  schedule:
    # Tomorrow preview — every 2 hours throughout the day
    # Nightly capture of reservations.json is handled by Mac cron + direct GitHub API push
    - cron: '0 */2 * * *'
  # Manual trigger — refreshes both today and tomorrow (useful for recovery)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          EVENT="${{ github.event_name }}"
          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            # Manual trigger: refresh both today and tomorrow for recovery
            echo "Manual run → reservations.json (days-ahead=0) + tomorrow.json (days-ahead=1)"
            python scrape.py --output data/reservations.json --days-ahead 0
            python scrape.py --output data/tomorrow.json --days-ahead 1
          else
            # 2-hourly daytime: refresh tomorrow preview only
            echo "Daytime run → tomorrow.json (days-ahead=1)"
            python scrape.py --output data/tomorrow.json --days-ahead 1
          fi
        env:
          TZ: America/Los_Angeles

      - name: Commit and push updated data
        run: |
          git config user.name  "Tennis Bot"
          git config user.email "tennis-bot@users.noreply.github.com"
          git add data/reservations.json data/tomorrow.json
          git diff --staged --quiet || git commit -m "Update data $(python -c "import datetime; print(datetime.date.today())")"
          git push
