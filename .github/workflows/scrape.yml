name: Scrape Tennis Court Reservations

on:
  schedule:
    # 11:49 PM PDT (UTC-7, mid-March through early November)
    - cron: '49 6 * * *'
    # 11:49 PM PST (UTC-8, early November through mid-March)
    - cron: '49 7 * * *'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape.py
        env:
          TZ: America/Los_Angeles

      - name: Commit and push updated data
        run: |
          git config user.name  "Tennis Bot"
          git config user.email "tennis-bot@users.noreply.github.com"
          git add data/reservations.json
          git diff --staged --quiet || git commit -m "Update reservations $(python -c "from datetime import date, timedelta; print(date.today() + timedelta(days=1))")"
          git push
