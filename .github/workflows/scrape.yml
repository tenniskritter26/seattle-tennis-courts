name: Scrape Tennis Court Reservations

on:
  schedule:
    # 11:49 PM PDT (UTC-7, mid-March through early November)
    - cron: '49 6 * * *'
    # 11:49 PM PST (UTC-8, early November through mid-March)
    - cron: '49 7 * * *'
    # Tomorrow preview — every 2 hours throughout the day
    - cron: '0 */2 * * *'
  # Allow manual trigger (updates reservations.json)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          SCHED="${{ github.event.schedule }}"
          EVENT="${{ github.event_name }}"
          if [[ "$SCHED" == "49 6 * * *" || "$SCHED" == "49 7 * * *" || "$EVENT" == "workflow_dispatch" ]]; then
            echo "Nightly run → data/reservations.json"
            python scrape.py --output data/reservations.json
          else
            echo "Daytime run → data/tomorrow.json"
            python scrape.py --output data/tomorrow.json
          fi
        env:
          TZ: America/Los_Angeles

      - name: Commit and push updated data
        run: |
          git config user.name  "Tennis Bot"
          git config user.email "tennis-bot@users.noreply.github.com"
          git add data/reservations.json data/tomorrow.json
          git diff --staged --quiet || git commit -m "Update data $(python -c "import datetime; print(datetime.date.today())")"
          git push
